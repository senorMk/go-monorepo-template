services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    image: ghcr.io/GITHUB_USERNAME/APP_NAME-api:dev
    restart: always
    environment:
      APP_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: https://APP_DOMAIN
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.http.routers.APP_NAME-api.rule=Host(`api.APP_DOMAIN`)
      - traefik.http.routers.APP_NAME-api.entrypoints=https
      - traefik.http.routers.APP_NAME-api.tls=true
      - traefik.http.routers.APP_NAME-api.tls.certresolver=letsencrypt
      - traefik.http.services.APP_NAME-api.loadbalancer.server.port=3000

  web:
    image: ghcr.io/GITHUB_USERNAME/APP_NAME-web:dev
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
    expose:
      - "4000"
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.http.routers.APP_NAME-web.rule=Host(`APP_DOMAIN`)
      - traefik.http.routers.APP_NAME-web.entrypoints=https
      - traefik.http.routers.APP_NAME-web.tls=true
      - traefik.http.routers.APP_NAME-web.tls.certresolver=letsencrypt
      - traefik.http.services.APP_NAME-web.loadbalancer.server.port=4000

volumes:
  postgres-data:
