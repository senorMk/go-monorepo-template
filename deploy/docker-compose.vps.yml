services:
  api:
    image: ghcr.io/GITHUB_USERNAME/APP_NAME-api:dev
    restart: always
    env_file:
      - ../.env
    environment:
      APP_ENV: production
      PORT: 3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s

  web:
    image: ghcr.io/GITHUB_USERNAME/APP_NAME-web:dev
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/.well-known:/var/www/certbot/.well-known:rw
