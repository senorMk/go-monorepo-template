name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: apps/api/go.sum

      - name: Vet, build and test the API
        working-directory: apps/api
        run: |
          go vet ./...
          go build ./...
          go test ./...

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test-api
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/GITHUB_USERNAME/APP_NAME-api:dev
            ghcr.io/GITHUB_USERNAME/APP_NAME-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/GITHUB_USERNAME/APP_NAME-web:dev
            ghcr.io/GITHUB_USERNAME/APP_NAME-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via Coolify
        run: curl -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}"
